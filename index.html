<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Grow Presentation</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b1020;
      --panel: rgba(255, 255, 255, 0.94);
      --ink: #111827;
      --muted: #64748b;
      --blue: #2563eb;
      --blue-dark: #1d4ed8;
      --chrome: rgba(15, 23, 42, 0.76);
    }

    html, body { height: 100%; }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: white;
      background:
        radial-gradient(circle at 12% 0%, rgba(59, 130, 246, 0.24), transparent 34rem),
        radial-gradient(circle at 92% 12%, rgba(168, 85, 247, 0.18), transparent 28rem),
        var(--bg);
    }

    .deck {
      position: relative;
      width: 100vw;
      height: 100vh;
      padding: clamp(14px, 2vw, 28px);
    }

    .slide {
      position: absolute;
      inset: clamp(14px, 2vw, 28px);
      display: grid;
      place-items: center;
      opacity: 0;
      transform: translateX(22px) scale(0.992);
      pointer-events: none;
      transition: opacity 220ms ease, transform 220ms ease;
    }

    .slide.active {
      opacity: 1;
      transform: translateX(0) scale(1);
      pointer-events: auto;
    }

    .slider-slide main {
      width: min(860px, 100%);
      background: var(--panel);
      border: 1px solid rgba(148, 163, 184, 0.28);
      border-radius: 30px;
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.32);
      padding: clamp(30px, 6vw, 64px);
      text-align: center;
      color: var(--ink);
    }

    .eyebrow {
      display: inline-flex;
      margin-bottom: 18px;
      padding: 8px 14px;
      border-radius: 999px;
      background: #eff6ff;
      color: var(--blue-dark);
      font-size: 0.85rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    h1 {
      max-width: 720px;
      margin: 0 auto 34px;
      font-size: clamp(2rem, 5vw, 3.75rem);
      line-height: 1.04;
      letter-spacing: -0.05em;
      color: var(--ink);
    }

    .score-card {
      display: inline-grid;
      gap: 4px;
      min-width: 132px;
      margin-bottom: 34px;
      padding: 18px 28px;
      border-radius: 22px;
      background: #111827;
      color: white;
      box-shadow: 0 18px 32px rgba(17, 24, 39, 0.24);
    }

    .score-label {
      color: #cbd5e1;
      font-size: 0.85rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #scoreValue {
      font-size: 4.4rem;
      line-height: 1;
      font-weight: 850;
      letter-spacing: -0.08em;
    }

    .slider-wrap {
      display: grid;
      gap: 16px;
      margin-top: 8px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--blue);
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 12px;
      border-radius: 999px;
      background: linear-gradient(90deg, #dbeafe, var(--blue));
    }

    input[type="range"]::-webkit-slider-thumb {
      width: 34px;
      height: 34px;
      margin-top: -11px;
      border: 4px solid white;
      border-radius: 50%;
      background: var(--blue-dark);
      box-shadow: 0 6px 18px rgba(37, 99, 235, 0.38);
      -webkit-appearance: none;
      appearance: none;
    }

    input[type="range"]::-moz-range-track {
      height: 12px;
      border-radius: 999px;
      background: linear-gradient(90deg, #dbeafe, var(--blue));
    }

    input[type="range"]::-moz-range-thumb {
      width: 28px;
      height: 28px;
      border: 4px solid white;
      border-radius: 50%;
      background: var(--blue-dark);
      box-shadow: 0 6px 18px rgba(37, 99, 235, 0.38);
    }

    .scale {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-weight: 850;
    }

    .helper-text {
      margin-top: 22px;
      color: #475569;
      font-size: 1.08rem;
    }

    .pdf-frame {
      width: min(100%, calc((100vh - 120px) * 16 / 9));
      max-height: calc(100vh - 92px);
      aspect-ratio: 16 / 9;
      display: grid;
      place-items: center;
      border-radius: 16px;
      overflow: hidden;
      background: #111827;
      box-shadow: 0 26px 80px rgba(0, 0, 0, 0.42);
    }

    .pdf-frame img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #111827;
    }

    @media (max-width: 760px) {
      .slide { inset: 12px; }
      .pdf-frame { width: calc(100vw - 28px); max-height: calc(100vh - 104px); }
    }
  </style>
</head>
<body>
  <div class="deck" id="deck" aria-live="polite">
    <section class="slide slider-slide active" data-title="Discipleship Strategy Slider">
      <main>
        <div class="eyebrow">Self-assessment</div>
        <h1>How strong do you feel your Discipleship strategy is?</h1>

        <section class="score-card" aria-live="polite">
          <span class="score-label">Your score</span>
          <span id="scoreValue">3</span>
        </section>

        <div class="slider-wrap">
          <label class="sr-only" for="discipleshipScore">Discipleship strategy strength from 1 to 5</label>
          <input id="discipleshipScore" type="range" min="1" max="5" step="1" value="3" />
          <div class="scale" aria-hidden="true">
            <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span>
          </div>
        </div>

        <p class="helper-text" id="helperText">Move the slider to rate your current strategy.</p>
      </main>
    </section>
  </div>

  <script>
    const pdfSlides = [
      "page-001.webp", "page-002.webp", "page-003.webp", "page-004.webp", "page-005.webp",
      "page-006.webp", "page-007.webp", "page-008.webp", "page-009.webp", "page-010.webp",
      "page-011.webp", "page-012.webp", "page-013.webp", "page-014.webp", "page-015.webp",
      "page-016.webp", "page-017.webp", "page-018.webp", "page-019.webp", "page-020.webp",
      "page-021.webp", "page-022.webp", "page-023.webp", "page-024.webp", "page-025.webp",
      "page-026.webp", "page-027.webp", "page-028.webp", "page-029.webp", "page-030.webp",
      "page-031.webp", "page-032.webp", "page-033.webp", "page-034.webp"
    ];

    const deck = document.querySelector('#deck');

    pdfSlides.forEach((file, index) => {
      const section = document.createElement('section');
      section.className = 'slide pdf-slide';
      section.dataset.title = `PDF slide ${index + 1}`;
      section.innerHTML = `
        <figure class="pdf-frame">
          <img src="assets/slides/${file}" alt="Webinar slide ${index + 1}" loading="lazy" decoding="async" />
        </figure>
      `;
      deck.appendChild(section);
    });

    const slides = Array.from(document.querySelectorAll('.slide'));
    let currentSlide = 0;

    function updateDeck() {
      slides.forEach((slide, index) => {
        slide.classList.toggle('active', index === currentSlide);
        slide.setAttribute('aria-hidden', index === currentSlide ? 'false' : 'true');
      });

      // Preload the next slide image to keep navigation smooth.
      [currentSlide + 1, currentSlide - 1].forEach((index) => {
        const img = slides[index]?.querySelector('img');
        if (img) {
          const preload = new Image();
          preload.src = img.src;
        }
      });
    }

    function goToSlide(index) {
      currentSlide = Math.max(0, Math.min(index, slides.length - 1));
      updateDeck();
    }

    function nextSlide() { goToSlide(currentSlide + 1); }
    function prevSlide() { goToSlide(currentSlide - 1); }

    window.addEventListener('keydown', (event) => {
      if (event.key === 'ArrowRight') {
        event.preventDefault();
        nextSlide();
      }
      if (event.key === 'ArrowLeft') {
        event.preventDefault();
        prevSlide();
      }
    });

    const slider = document.querySelector('#discipleshipScore');
    const scoreValue = document.querySelector('#scoreValue');
    const helperText = document.querySelector('#helperText');

    const labels = {
      1: 'Needs significant attention.',
      2: 'Some pieces are present, but gaps remain.',
      3: 'Moderately strong with room to grow.',
      4: 'Strong and mostly intentional.',
      5: 'Very strong, clear, and repeatable.'
    };

    function updateScore() {
      scoreValue.textContent = slider.value;
      helperText.textContent = labels[slider.value];
    }

    slider.addEventListener('input', updateScore);
    updateScore();
    updateDeck();
  </script>
</body>
</html>
